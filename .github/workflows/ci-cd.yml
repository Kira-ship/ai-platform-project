name: CI/CD Pipeline (No AWS)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # 定义镜像名称，格式：ghcr.io/用户名/仓库名/服务名
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # 必须拥有写入包的权限才能推送到 GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🔑 核心步骤：登录 GitHub Container Registry
      # 不需要任何 Secrets，直接使用 GITHUB_TOKEN
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 可选：部署步骤 (如果你有一台自己的服务器或本地机器作为 Runner)
  deploy-local:
    needs: build-and-push
    runs-on: self-hosted  # 需要你自己在一台机器上安装 GitHub Runner
    if: github.ref == 'refs/heads/main' # 仅在 main 分支部署
    
    steps:
      - name: Login to GHCR on Deploy Machine
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull latest image
        run: docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest

      - name: Stop old container
        run: docker stop my-backend-app || true

      - name: Run new container
        run: |
          docker run -d \
            --name my-backend-app \
            --restart always \
            -p 5000:5000 \
            -e APP_NAME="ProductionApp" \
            -e DEBUG=False \
            ghcr.io/${{ env.IMAGE_NAME }}:latest
