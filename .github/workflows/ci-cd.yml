name: Auto Env Build & Security Scan

on:
  push:
    paths:
      - 'backend/**'
      - 'infra/scripts/**'
      - 'security/**'

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Dockerfile (喻冬星的核心脚本)
        run: python infra/scripts/generate_dockerfile.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/my-dachuang-backend:$IMAGE_TAG ./backend

      - name: Run Security Scan (配合赵崭)
        run: |
          # 在容器内运行 bandit/flake8
          docker run --rm $ECR_REGISTRY/my-dachuang-backend:$IMAGE_TAG pip install bandit flake8
          docker run --rm $ECR_REGISTRY/my-dachuang-backend:$IMAGE_TAG bandit -r . || echo "⚠️ 安全警告"

      - name: Push to ECR
        if: github.ref == 'refs/heads/main'
        run: |
          docker push $ECR_REGISTRY/my-dachuang-backend:$IMAGE_TAG
