name: CI/CD Pipeline (No AWS)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # 🔑 关键修复：将仓库名转为小写（Docker 镜像名必须小写）
  REPO_LOWER: ${{ github.repository_owner }}/${{ github.event.repository.name }}
  IMAGE_NAME: ${{ github.repository_owner }}/${{ github.event.repository.name }}/backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # 🔑 关键修复：使用小写镜像名
          images: ghcr.io/${{ env.REPO_LOWER }}/backend
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-local:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR on Deploy Machine
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull latest image
        run: |
          # 🔑 关键修复：转小写后拉取
          IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')/backend
          echo "Pulling: ghcr.io/$IMAGE_NAME:latest"
          docker pull ghcr.io/$IMAGE_NAME:latest

      - name: Run new container
        run: |
          IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')/backend
          docker run -d \
            --name my-backend-app \
            -p 5000:5000 \
            -e APP_NAME="DemoApp" \
            -e DEBUG=True \
            ghcr.io/$IMAGE_NAME:latest

      - name: Wait for service to start
        run: sleep 15

      - name: Health Check (验证后端是否跑通)
        run: |
          echo "Testing backend at http://localhost:5000..."
          curl -f http://localhost:5000/ || curl -f http://localhost:5000/health || curl -f http://localhost:5000/api/status || echo "尝试访问根路径..."
          curl -v http://localhost:5000/

      - name: Show Running Containers
        run: docker ps
