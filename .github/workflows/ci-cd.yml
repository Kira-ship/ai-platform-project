name: CI/CD Pipeline (No AWS)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # 定义镜像名称，格式：ghcr.io/用户名/仓库名/服务名
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # 必须拥有写入包的权限才能推送到 GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🔑 核心步骤：登录 GitHub Container Registry
      # 不需要任何 Secrets，直接使用 GITHUB_TOKEN
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 可选：部署步骤 (如果你有一台自己的服务器或本地机器作为 Runner)
   # ✅ 修改后的部署步骤（使用 GitHub 免费机器演示）
  deploy-local:
    needs: build-and-push
    runs-on: ubuntu-latest  # 🔴 改这里：从 self-hosted 改为 ubuntu-latest
    # if: github.ref == 'refs/heads/main'  # 🟡 暂时注释掉，方便测试所有分支
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR on Deploy Machine
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull latest image
        run: docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest

      # 🟡 删除了 "Stop old container" 步骤，因为每次都是全新环境

      - name: Run new container
        run: |
          docker run -d \
            --name my-backend-app \
            -p 5000:5000 \
            -e APP_NAME="DemoApp" \
            -e DEBUG=True \
            ghcr.io/${{ env.IMAGE_NAME }}:latest

      - name: Wait for service to start
        run: sleep 15  # 给容器更多启动时间

      - name: Health Check (验证后端是否跑通)
        run: |
          echo "Testing backend at http://localhost:5000..."
          curl -f http://localhost:5000/ || curl -f http://localhost:5000/health || curl -f http://localhost:5000/api/status || echo "尝试访问根路径..."
          curl -v http://localhost:5000/  # 详细输出，方便调试

      - name: Show Running Containers
        run: docker ps
