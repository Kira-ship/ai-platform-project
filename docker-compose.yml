
services:
  backend:
    image: ghcr.io/kira-ship/ai-platform-project/backend:latest
    container_name: fanfu-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - APP_NAME=FanFuBackendService
      - DEBUG=False
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
